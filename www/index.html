<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/mushroom.png" sizes="48x48"/>
  <title>Welcome to Your HTTP Server</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400&family=Audiowide&display=swap" 
    rel="stylesheet"
  >

  <style>
    body {
      margin: 0;
      font-family: 'Exo 2', sans-serif;
      color: #FAFAFA;
      background: #000;
      
      /* Example background: to set it here:
         background-image: url('kaleidoscope-pattern.png'); 
      */
      /* with no image, gradient and animate hue instead: */
      background: linear-gradient(135deg, #000, #111, #000);
      background-size: 400% 400%;
      animation: hueShiftBg 10s infinite linear;
    }

    @keyframes hueShiftBg {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    h1 {
      font-family: 'Audiowide', cursive;
      text-align: center;
      font-size: 3rem;
      color: #00FACC;
      text-shadow: 0 0 5px #FA00CC, 0 0 10px #005CFA;
      animation: hueShiftText 5s infinite linear;
      margin-top: 2rem;
    }

    @keyframes hueShiftText {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    p {
      text-align: center;
      margin: 1rem auto;
      max-width: 600px;
      line-height: 1.5;
    }

    ul {
      list-style: none;
      text-align: center;
      padding: 0;
    }

    li a {
      color: #FA00CC;
      text-decoration: none;
      display: inline-block;
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      border: 2px solid #FA00CC;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    li a:hover {
      filter: hue-rotate(120deg);
      text-shadow: 0 0 5px #00FACC;
      background-color: rgba(250, 0, 204, 0.1);
    }

    img {
      display: block;
      margin: 2rem auto;
      max-width: 80%;
      border: 3px solid #00FACC;
      box-shadow: 0 0 10px #FA00CC;
      transition: transform 0.5s ease;
    }

    img:hover {
      transform: rotate(10deg) scale(1.05);
    }

    /* Optional floating geometric shape */
    .floating-shape {
      position: absolute;
      top: 10%;
      right: 5%;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #FA00CC, #00FACC);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      animation: floaty 5s infinite ease-in-out alternate;
      opacity: 0.8;
    }

    @keyframes floaty {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(20px) rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Your trippy Webserver!</h1>
  <p>Prepare for a cosmic visual journey!</p>
  <ul>
    <li><a href="/images/">View Images</a></li>
    <li><a href="/upload_form/">Upload Form</a></li>
    <li><a href="/uploads/">Uploaded Files</a></li>
    <li><a href="/cgi-bin/">Run CGI Script</a></li>
    <li><a href="/redirect/">Test Redirect</a></li>
  </ul>
  <img src="/images/psychedelic1.png" alt="image"/>
  <div class="floating-shape"></div>
</body>
</html>
