<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>505</title>
    <style>
        body {
            background-color: #0c0c0c;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            color: #d94f4f;
        }

        p {
            font-size: 18px;
            color: #48aa10;
            margin-bottom: 20px;
        }

        p span {
            animation: blink 1s infinite;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>505 HTTP Version Not Supported</h1>
    <p><span>Sorry!</span> The HTTP version used is not supported by this server.</p>
    <img src="https://i.pinimg.com/originals/a5/d1/82/a5d1823802d5219a6038fc0a5b401ff4.jpg" alt="505 Image">
</body>
</html>
