<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>400</title>
    <style>
        body {
            background-color: #0c0c0c;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            color: #d94f4f;
        }

        p {
            font-size: 18px;
            color: #48aa10;
            margin-bottom: 20px;
        }

        p span {
            animation: blink 1s infinite;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>400 Bad Request</h1>
    <p><span>Oops!</span> Your request cannot be processed due to bad syntax.</p>
    <img src="https://theaipromptshop.com/cdn/shop/files/0219320d-8a94-42c9-a429-a6550d35d575.jpg?v=1712162899" alt="400 Image">
</body>
</html>
